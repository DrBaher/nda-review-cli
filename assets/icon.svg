<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#fdfcf9"/>
  <!-- document outline -->
  <path d="M 130 100 L 320 100 L 380 160 L 380 410 L 130 410 Z"
        fill="#fdfcf9" stroke="#1f7d5d" stroke-width="16" stroke-linejoin="round"/>
  <!-- folded corner -->
  <path d="M 320 100 L 380 160 L 320 160 Z"
        fill="#1f7d5d" stroke="#1f7d5d" stroke-width="16" stroke-linejoin="round"/>
  <!-- NDA letters as the document's main content -->
  <text x="255" y="285"
        font-family="Helvetica, Arial, sans-serif"
        font-size="92"
        font-weight="700"
        fill="#1f7d5d"
        text-anchor="middle"
        letter-spacing="-2">NDA</text>
  <!-- magnifying glass (review angle) -->
  <circle cx="345" cy="345" r="55" fill="#fdfcf9" stroke="#0e4a37" stroke-width="20"/>
  <line x1="385" y1="385" x2="430" y2="430" stroke="#0e4a37" stroke-width="22" stroke-linecap="round"/>
</svg>
