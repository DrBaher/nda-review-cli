# Fly.io deployment config for the nda-review-cli demo.
# Deploy with: fly launch --copy-config --no-deploy && fly deploy
# Configure your app name in the [app] block and region near your audience.

app = "nda-review-cli-demo"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PORT = "8080"
  NDA_DEMO_SESSION_TTL = "1800"
  NDA_DEMO_MAX_SESSIONS = "200"
  NDA_DEMO_RATE_LIMIT = "30"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
