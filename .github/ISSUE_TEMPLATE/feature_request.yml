name: Feature request
description: Suggest a new capability or change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation. The clearer the problem, the better the eventual fix.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: A sketch is fine; a full design isn't required.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why aren't they enough?

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - "Small (a flag, a new helper)"
        - "Medium (a new subcommand)"
        - "Large (architectural change)"
        - "Not sure"
    validations:
      required: true

  - type: checkboxes
    id: principles
    attributes:
      label: Project-principles fit
      description: Please confirm the request is compatible with the existing design constraints
      options:
        - label: Local-first — does not require always-on network or third-party hosted services (LLM calls remain opt-in)
          required: true
        - label: No new runtime dependencies — stdlib-only Python stays the rule
          required: true
        - label: Deterministic by default — any non-determinism is opt-in and documented
          required: true
