name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Before filing, please run `./nda_review_cli.py doctor` and include the output below — it diagnoses many common setup issues.

  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `./nda_review_cli.py --version`
      placeholder: "nda-review-cli 0.5.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: OS + Python version
      placeholder: "macOS 14.4, Python 3.11.7"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact command that triggered the bug
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or unexpected JSON output
      render: shell
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: doctor output (optional)
      description: Output of `./nda_review_cli.py doctor`. Redact paths if sensitive.
      render: json

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not pasted any real NDA text, counterparty names, or API keys into this report
          required: true
