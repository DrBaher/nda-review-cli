name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python3 -m py_compile nda_review_cli.py step2_pass2_review.py generate_redline_instructions.py rule_engine.py
      - name: Run tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

  tutorial-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Tutorial end-to-end smoke
        run: |
          ./nda_review_cli.py tutorial --base "${RUNNER_TEMP}/nda-tutorial" --no-prompt --run-sample
          test -f "${RUNNER_TEMP}/nda-tutorial/output/nda_playbook.json"
          test -f "${RUNNER_TEMP}/nda-tutorial/output/reviews/tutorial-review.json"
      - name: Doctor smoke (informational)
        run: ./nda_review_cli.py doctor --base "${RUNNER_TEMP}/nda-tutorial" || echo "doctor reported issues (expected for sandbox)"

  build-and-install-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build wheel and sdist
        run: |
          python3 -m pip install --upgrade pip build
          python3 -m build --wheel --sdist
          ls -la dist/
      - name: Install wheel into a fresh venv and exercise CLI
        run: |
          python3 -m venv /tmp/nda-runtime
          /tmp/nda-runtime/bin/pip install --quiet dist/nda_review_cli-*.whl
          /tmp/nda-runtime/bin/nda-review-cli --version
          /tmp/nda-runtime/bin/nda-review-cli quickstart --base "${RUNNER_TEMP}/nda-installed" --no-prompt --yes
          # All three bundled templates must work from the installed wheel
          # (regression test: common-paper was previously missing from the
          # wheel include list). Smoke-render each.
          for tpl in mutual common-paper-mutual; do
            /tmp/nda-runtime/bin/nda-review-cli draft \
              --base "${RUNNER_TEMP}/nda-installed" \
              --template "$tpl" \
              --party-a "Acme" --party-a-address "1 Way" \
              --party-b "Beta" --party-b-address "2 Way" \
              --purpose "test" \
              --governing-law "California" \
              --out "${RUNNER_TEMP}/nda-installed/draft-$tpl.md" \
              --out-docx "${RUNNER_TEMP}/nda-installed/draft-$tpl.docx"
            test -s "${RUNNER_TEMP}/nda-installed/draft-$tpl.docx"
          done
          /tmp/nda-runtime/bin/nda-review-cli draft \
            --base "${RUNNER_TEMP}/nda-installed" \
            --template one-way-out \
            --disclosing-party "Acme" --disclosing-party-address "1 Way" \
            --receiving-party "Vendor" --receiving-party-address "2 Way" \
            --purpose "test" \
            --out "${RUNNER_TEMP}/nda-installed/draft-oneway.md"
          # sample-nda subcommand also depends on a bundled fixture being in the wheel
          /tmp/nda-runtime/bin/nda-review-cli sample-nda --out "${RUNNER_TEMP}/nda-installed/sample.txt"
          test -s "${RUNNER_TEMP}/nda-installed/sample.txt"

  quickstart-and-draft-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Quickstart non-interactive
        run: |
          ./nda_review_cli.py quickstart --base "${RUNNER_TEMP}/nda-quick" --no-prompt --yes
          test -f "${RUNNER_TEMP}/nda-quick/config/org-policy.json"
          test -f "${RUNNER_TEMP}/nda-quick/config/quickstart-answers.json"
          test -f "${RUNNER_TEMP}/nda-quick/profiles/default.json"
      - name: Draft mutual + one-way-out (md + docx)
        run: |
          ./nda_review_cli.py draft \
            --base "${RUNNER_TEMP}/nda-quick" \
            --template mutual \
            --party-a "Acme Inc." --party-a-address "123 Main St" \
            --party-b "Beta LLC" --party-b-address "10 Market Way" \
            --purpose "evaluating a partnership" \
            --out "${RUNNER_TEMP}/nda-quick/out/mutual.md" \
            --out-docx "${RUNNER_TEMP}/nda-quick/out/mutual.docx"
          ./nda_review_cli.py draft \
            --base "${RUNNER_TEMP}/nda-quick" \
            --template one-way-out \
            --disclosing-party "Acme Inc." --disclosing-party-address "123 Main St" \
            --receiving-party "Vendor Co" --receiving-party-address "100 Lake Rd" \
            --purpose "vendor diligence" \
            --out "${RUNNER_TEMP}/nda-quick/out/oneway.md" \
            --out-docx "${RUNNER_TEMP}/nda-quick/out/oneway.docx"
          test -s "${RUNNER_TEMP}/nda-quick/out/mutual.docx"
          test -s "${RUNNER_TEMP}/nda-quick/out/oneway.docx"
      - name: Verify generated docx zips are well-formed
        run: |
          python3 -c "
          import zipfile, xml.etree.ElementTree as ET, sys
          for path in sys.argv[1:]:
              with zipfile.ZipFile(path) as zf:
                  for name in zf.namelist():
                      ET.fromstring(zf.read(name))
                  print(f'OK: {path}')
          " "${RUNNER_TEMP}/nda-quick/out/mutual.docx" "${RUNNER_TEMP}/nda-quick/out/oneway.docx"

  negotiate-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up two distinct workspaces
        run: |
          mkdir -p "${RUNNER_TEMP}/neg"
          ./nda_review_cli.py quickstart --base "${RUNNER_TEMP}/neg/a" --no-prompt --yes
          ./nda_review_cli.py quickstart --base "${RUNNER_TEMP}/neg/b" --no-prompt --yes
          python3 -c "
          import json
          for d, name in [('${RUNNER_TEMP}/neg/a', 'Acme'), ('${RUNNER_TEMP}/neg/b', 'Beta')]:
              p = f'{d}/config/org-policy.json'
              o = json.load(open(p))
              o['org_name'] = name
              json.dump(o, open(p, 'w'))
          "
      - name: Run a full negotiate flow (init → counter → accept → sign-off → finalize)
        run: |
          STATE="${RUNNER_TEMP}/neg/state.json"
          ./nda_review_cli.py negotiate init \
            --base "${RUNNER_TEMP}/neg/a" \
            --template mutual \
            --party-a-name "Acme" --party-a-address "1 Main" \
            --party-b-name "Beta" --party-b-address "2 Side" \
            --purpose "ci smoke test" --effective-date "2026-01-01" \
            --out "$STATE"
          ./nda_review_cli.py negotiate counter --base "${RUNNER_TEMP}/neg/b" --state "$STATE" --auto
          ./nda_review_cli.py negotiate accept  --base "${RUNNER_TEMP}/neg/a" --state "$STATE" --as a
          ./nda_review_cli.py negotiate sign-off --base "${RUNNER_TEMP}/neg/a" --state "$STATE" --as a --yes
          ./nda_review_cli.py negotiate sign-off --base "${RUNNER_TEMP}/neg/b" --state "$STATE" --as b --yes
          ./nda_review_cli.py negotiate finalize \
            --base "${RUNNER_TEMP}/neg/a" --state "$STATE" \
            --out-md  "${RUNNER_TEMP}/neg/agreed.md" \
            --out-docx "${RUNNER_TEMP}/neg/agreed.docx"
          test -s "${RUNNER_TEMP}/neg/agreed.md"
          test -s "${RUNNER_TEMP}/neg/agreed.docx"
          python3 -c "
          import json
          state = json.load(open('${RUNNER_TEMP}/neg/state.json'))
          assert state['status'] == 'finalized', f'expected finalized, got {state[\"status\"]}'
          assert 'a' in state['signoffs'] and 'b' in state['signoffs']
          print('finalized state OK')
          "
      - name: Run negotiate analyze + validate
        run: |
          STATE="${RUNNER_TEMP}/neg/state.json"
          ./nda_review_cli.py negotiate analyze --base "${RUNNER_TEMP}/neg/a" --state "$STATE" \
            | python3 -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          assert d['status'] == 'finalized'
          assert d['outcome_interpretation']['label'] in ('finalized', 'converged organically', 'converged via fatigue')
          assert d['rounds_total'] >= 3
          print('analyze OK')
          "
          ./nda_review_cli.py negotiate validate --state "$STATE" \
            | python3 -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          assert d['ok'] is True
          assert d['hash_chain_verified'] is True
          assert not d['structural_issues']
          print('validate OK')
          "
      - name: Run negotiate simulate (game-theoretic check)
        run: |
          ./nda_review_cli.py negotiate simulate \
            --party-a-base "${RUNNER_TEMP}/neg/a" \
            --party-b-base "${RUNNER_TEMP}/neg/b" \
            --stance-a compromising --stance-b compromising \
            --mode auto --max-rounds 5 \
            --out "${RUNNER_TEMP}/neg/sim-report.json" \
            --state "${RUNNER_TEMP}/neg/sim-state.json"
          python3 -c "
          import json
          r = json.load(open('${RUNNER_TEMP}/neg/sim-report.json'))
          assert r['outcome'] == 'converged', f'expected converged, got {r[\"outcome\"]}'
          print('simulate OK')
          "
